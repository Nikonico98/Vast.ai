                  cursor: grab;

            #ring-container:active {

            #ring-track {

                  height: 220px;

            #ring-handle {

            #handle-box {

            #handle-number {

                  transition: transform .2s ease

            #handle-number.pop {
                  animation: numberPop .3s ease forwards

            @keyframes numberPop {
                  0% {
                        transform: scale(1)

                  50% {
                        transform: scale(1.4);
                        color: #4caf50
                  }

                  100% {
                        transform: scale(1);
                        color: #fff
                  }
            }

            #ring-container::after {
                  display: none
            }

            #checkpoint-dot {
                  display: none !important
            }

            #checkpoint-dot.visible {
                  display: none !important
            }

            #checkpoint-dot.fade-out {
                  display: none !important
            }

            #flash-overlay {
                  position: fixed;
                  top: 0;
                  left: 0;
                  width: 100vw;
                  height: 100vh;
                  background: rgba(255, 255, 255, 0.85);
                  z-index: 99999;
                  pointer-events: none;
                  opacity: 0;
                  transition: opacity 0.08s ease-in;
            }

            #flash-overlay.active {
                  opacity: 1;
            }

            #flash-overlay.gold {
                  background: rgba(255, 213, 74, 0.7);
            }

            #safecrack-hint {
                  position: fixed;
                  top: calc(env(safe-area-inset-top, 20px) + 80px);
                  left: 50%;
                  transform: translateX(-50%);

                  -webkit-backdrop-filter: blur(10px);
                  opacity: 0;
                  pointer-events: none;
                  transition: opacity 0.4s ease;
                  text-align: center;
            }

            #safecrack-hint.visible {
                  opacity: 1;
            }

            @keyframes tapPulse {

                  0%,
                  100% {
                        opacity: .6
                  }

                  50% {
                        opacity: 1
                  }
            }

            @keyframes fadeIn {
                  from {
                        opacity: 0;
                        transform: translateX(-50%) translateY(-10px)
                  }

                  to {
                        opacity: 1;
                        transform: translateX(-50%) translateY(0)
                  }
            }

            @keyframes pulse {

                  0%,
                  100% {
                        opacity: 1
                  }

                  50% {
                        opacity: .5
                  }
            }

            .ar-ui-hidden {
                  display: none !important
            }

            #item-name-display {

                  transform: translateX(-50%);
                  background: linear-gradient(135deg, #667eea 0, #764ba2 100%);
                  color: #fff;
                  padding: 10px 24px;
                  border-radius: 20px;
                  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

                  font-weight: 600;
                  z-index: 1000;

            }

            #item-name-display.visible {
                  opacity: 1;

                  display: none !important
            }

            #sprite-burst-overlay {
                  position: fixed;
                  top: 0;
                  left: 0;
                  width: 100vw;
                  height: 100vh;
                  z-index: 9998;
                  pointer-events: none;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  opacity: 0;
                  visibility: hidden
            }

            #sprite-burst-overlay.active {

            }

            .sprite-burst-window {
                  width: 80vw;
                  max-width: 500px;
                  height: 80vw;
                  max-height: 500px;
                  display: flex;
                  align-items: center;
                  justify-content: center
            }

            .sprite-burst-img {
                  width: 100%;
                  height: 100%;
                  background-image: url(star-burst.png);
                  background-size: contain;
                  background-repeat: no-repeat;
                  background-position: center;
                  animation: burstSpin 1.2s ease-out forwards
            }

            @keyframes burstFlash {
                  0% {
                        opacity: 0
                  }

                  10% {
                        opacity: 1
                  }

                  40% {
                        opacity: 1
                  }

                  100% {
                        opacity: 0
                  }
            }

            @keyframes burstSpin {
                  0% {
                        transform: scale(.2) rotate(0);
                        opacity: 0
                  }

                  15% {
                        transform: scale(1.8) rotate(60deg);
                        opacity: 1
                  }

                  40% {
                        transform: scale(1.5) rotate(120deg);
                        opacity: 1
                  }

                  100% {
                        transform: scale(.6) rotate(240deg);
                        opacity: 0
                  }
            }

            #star-blink-container {
                  position: fixed;
                  top: 0;
                  left: 0;
                  width: 100vw;
                  height: 100vh;
                  pointer-events: none;
                  z-index: 999;
                  overflow: hidden
            }

            .star-blink {
                  position: absolute;
                  width: 24px;
                  height: 24px;
                  background-image: url(star-blink.png);
                  background-size: contain;
                  background-repeat: no-repeat;
                  opacity: 0;
                  animation: starFloat var(--star-duration, 3s) ease-in-out var(--star-delay, 0s) forwards
            }

            .star-blink.star-sm {
                  width: 16px;
                  height: 16px
            }

            .star-blink.star-md {
                  width: 24px;
                  height: 24px
            }

            .star-blink.star-lg {
                  width: 34px;
                  height: 34px
            }

            @keyframes starFloat {
                  0% {
                        opacity: 0;
                        transform: translateY(0) rotate(0) scale(.5)
                  }

                  20% {
                        opacity: .9;
                        transform: translateY(-10px) rotate(30deg) scale(1)
                  }

                  50% {
                        opacity: .7;
                        transform: translateY(-25px) rotate(90deg) scale(.9)
                  }

                  80% {
                        opacity: .4;
                        transform: translateY(-40px) rotate(150deg) scale(.7)
                  }

                  100% {
                        opacity: 0;
                        transform: translateY(-55px) rotate(200deg) scale(.4)
                  }
            }

            #pre-ar-overlay {
                  position: fixed;
                  inset: 0;
                  display: flex;
                  flex-direction: column;
                  align-items: center;
                  justify-content: center;

            }

            #pre-ar-status {

                  color: rgba(255, 255, 255, .85);
                  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                  font-size: 14px;
                  line-height: 1.5;
                  white-space: pre-line
            }

            #enter-ar-button {
                  width: 100%;
                  max-width: 320px;
                  margin-top: 22px;
                  padding: 14px 18px;
                  border: 0;
                  border-radius: 12px;
                  background: #fff;
                  color: #4a2d7a;

                  font-weight: 700;
                  cursor: pointer;
                  transition: transform .2s ease, opacity .2s ease;
                  box-shadow: 0 2px 12px rgba(0, 0, 0, .15)
            }

            #enter-ar-button:disabled {
                  opacity: .5;
                  cursor: not-allowed
            }

            #enter-ar-button:not(:disabled):active {
                  transform: translateY(1px)
            }
